name: MagicDocu Production Docker

on:
  push:
    branches: [ "prod" ]

jobs:
  db-image:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repository
        uses: actions/checkout@v6 
      - name: Registry login
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: './docker/postgres/Dockerfile'
          push: true
          tags: ghcr.io/Sprinter05/magicdocu/postgres:latest

  api-image:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repository
        uses: actions/checkout@v6
      - name: Registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: './docker/django/Dockerfile'
          push: true
          tags: ghcr.io/Sprinter05/magicdocu/django:latest