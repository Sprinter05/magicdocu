<!DOCTYPE html>
<html>
<head>
    
<title>Search Results</title>
</head>
<body>
    <h1>Search Results</h1>
    <form method="GET" action="{% url 'search' %}">
        <input type="text" name="q" placeholder="Search for docs..." value="{{ request.GET.q }}">
    
    </form>
    
    <ul>
        {% for doc in docs %}
            <li>{{ doc.title }} and {{ doc.summary }} }})</li>
        {% empty %}    
            <li>No results found.</li>
        {% endfor %}
    </ul>
</body>
</html>
