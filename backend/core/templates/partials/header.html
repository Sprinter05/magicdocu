<header
    class="flex items-center justify-between whitespace-nowrap glass-header border-b border-border-dark px-8 py-4 sticky top-0 z-50">
    <div class="flex items-center gap-12 w-full">
        <div class="flex items-center gap-3 text-text-primary min-w-[200px]">
            <div class="size-8 text-primary">
                <span class="material-symbols-outlined text-4xl">auto_awesome_mosaic</span>
            </div>
            <h2 class="text-xl font-bold leading-tight tracking-[-0.015em]">MagicDocu</h2>
        </div>
        <form method="get" action="{% url 'documents' %}" class="flex w-full max-w-2xl rounded-xl bg-white/5 border border-white/10 group-focus-within:border-primary/50 group-focus-within:bg-white/10 group-focus-within:shadow-[0_0_20px_rgba(139,92,246,0.2)] transition-all duration-300 h-12">
    <div class="flex items-center justify-center pl-4 text-text-secondary rounded-l-xl">
        <span class="material-symbols-outlined">search</span>
    </div>
    <input type="text" name="q"
        class="flex-1 bg-transparent text-text-primary placeholder:text-text-secondary/70 focus:outline-none focus:ring-0 border-none h-full px-4 text-base"
        placeholder="Search documents, tags, or OCR content..." value="{{ query|default:'' }}" />
    <button type="submit" class="flex items-center justify-center pr-4 text-text-secondary rounded-r-xl hover:text-primary transition-colors">
        <span class="material-symbols-outlined">search</span>
    </button>
</form>
        <div class="flex items-center justify-end gap-6 flex-1">
            <nav class="hidden xl:flex items-center gap-8">
                <a class="text-text-secondary hover:text-primary transition-colors text-sm font-medium leading-normal"
                    href="#">Dashboard</a>
                <a class="text-primary text-sm font-medium leading-normal relative after:content-[''] after:absolute after:-bottom-6 after:left-0 after:w-full after:h-0.5 after:bg-primary after:shadow-[0_0_8px_#8b5cf6]"
                    href="#">Library</a>
                <a class="text-text-secondary hover:text-primary transition-colors text-sm font-medium leading-normal"
                    href="#">Upload</a>
            </nav>
            <div class="flex items-center gap-4">
                <button
                    class="size-10 flex items-center justify-center rounded-full hover:bg-white/10 text-text-secondary transition-colors relative">
                    <span class="material-symbols-outlined">notifications</span>
                    <span
